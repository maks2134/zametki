services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - zametka_mongo:/data/db

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: zametka
      JWT_SECRET: change-me-to-a-long-secret-at-least-32
      JWT_TTL: 720h
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - mongo

volumes:
  zametka_mongo:
